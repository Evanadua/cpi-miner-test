<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MINERV v2.0 — CPI Pi Miner</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
  body {
    margin: 0;
    font-family: "Inter", Arial, sans-serif;
    background: linear-gradient(180deg, #000000, #1a1a1a, #4a3b00);
    color: #fff;
    overflow-x: hidden;
    padding-bottom: 90px;
  }

  /* --- Splash Screen --- */
  #splash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle, #1a1a1a, #000);
    z-index: 9999; transition: opacity 0.6s ease-out;
  }
  #splash video { width: 150px; height: 150px; border-radius: 50%; box-shadow: 0 0 30px #f9d56e; }

  /* --- Top Bar --- */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 15px; background: rgba(0,0,0,0.8);
    border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100;
  }
  .profile-pic { width: 42px; height: 42px; border-radius: 50%; border: 2px solid gold; object-fit: cover; }
  .wallet-box {
    display: flex; align-items: center; gap: 8px; background: rgba(255, 215, 0, 0.1);
    padding: 8px 12px; border-radius: 20px; font-weight: bold; color: gold; border: 1px solid rgba(255,215,0,0.3);
  }
  .wallet-box img { width: 18px; height: 18px; }

  /* --- Content --- */
  .dashboard {
    max-width: 450px; margin: 20px auto; padding: 20px;
    background: rgba(20, 20, 20, 0.9); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin-left: 15px; margin-right: 15px;
  }
  .coin-wrap { display: flex; justify-content: center; margin: 20px 0; }
  .coin-wrap video { width: 180px; height: 180px; border-radius: 50%; filter: drop-shadow(0 0 15px gold); }
  
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .status-text { text-align: center; margin-bottom: 15px; }
  .timer { font-size: 32px; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
  
  .progress { height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin: 15px 0; border: 1px solid #333; }
  .progress span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, #ffd700, #ff8c00); transition: width 0.5s; }

  button {
    width: 100%; padding: 15px; border: none; border-radius: 12px;
    font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
    background: linear-gradient(90deg, #f6d365, #fda085); color: #000;
  }
  button:active { transform: scale(0.95); }

  #mining-log {
    font-family: 'Courier New', monospace; font-size: 11px; color: #00ffaa;
    background: #000; padding: 10px; border-radius: 8px; height: 70px;
    overflow-y: auto; margin-top: 15px; border: 1px solid #222;
  }

  /* --- Bottom Nav --- */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px);
    display: flex; justify-content: space-around; padding: 15px 0;
    border-top: 1px solid #222; z-index: 1000;
  }
  .nav-item { text-align: center; color: #666; font-size: 11px; cursor: pointer; }
  .nav-item.active { color: gold; }
  .nav-item svg { width: 24px; height: 24px; fill: currentColor; display: block; margin: 0 auto 4px; }

  /* --- Utility Card --- */
  .card { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #333; }
  .list-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 13px; }
  .ref-input { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: gold; border-radius: 8px; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="splash">
  <video autoplay muted loop playsinline>
    <source src="cpi_coin.mp4" type="video/mp4">
  </video>
</div>

<div class="top-bar">
  <img src="profile.jpg" class="profile-pic" id="profilePic">
  <div class="wallet-box">
    <span id="user-id">Loading...</span>
    <span class="balance" id="balance-display">0.00</span>
    <img src="cpi-logo-gold.png">
  </div>
</div>

<div class="dashboard" id="page-miner">
  <div class="coin-wrap">
    <video id="coinVideo" autoplay muted loop playsinline><source src="cpi_coin.mp4" type="video/mp4"></video>
  </div>
  <div class="status-text">
    <div id="node-status" style="color: gold; font-weight: bold;">Cloud Node — Ready</div>
    <div class="timer" id="timer">08:00:00</div>
    <div class="progress"><span id="progress-bar"></span></div>
    <div style="font-size: 14px;">Estimated Reward: <span id="reward" style="color: #00ffaa;">0.000000 CPI</span></div>
  </div>
  <button id="mineBtn">🚀 Start Mining</button>
  <div id="mining-log"></div>
</div>

<div class="dashboard" id="page-wallet" style="display: none;">
  <h3 style="text-align: center; color: gold;">Pi Wallet Integration</h3>
  <div class="card">
    <p style="font-size: 12px; color: #888;">Available Balance</p>
    <h2 id="wallet-balance">0.000 CPI</h2>
    <button style="background: #00ffaa;">Withdraw to Pi Mainnet</button>
  </div>
</div>

<div class="dashboard" id="page-setting" style="display: none;">
  <h3 style="text-align: center; color: gold;">Account Settings</h3>
  <div class="card">
    <div class="list-item"><span>Network</span> <span style="color: #00ffaa;">Pi Testnet</span></div>
    <div class="list-item"><span>SDK Version</span> <span>2.0.0</span></div>
  </div>
  <div class="card">
    <p style="font-size: 12px; margin-bottom: 5px;">Your Referral Link</p>
    <input type="text" id="refLink" class="ref-input" readonly>
    <button onclick="copyRef()" style="background: #444; color: #fff; padding: 8px;">Copy Link</button>
  </div>
  <button onclick="location.reload()" style="margin-top: 20px; background: #ff4d4d; color: #fff;">Refresh App</button>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="changeMenu(this, 'page-miner')">
    <svg viewBox="0 0 24 24"><path d="M12 3l8 6v12h-5v-7H9v7H4V9l8-6z"/></svg>
    Miner
  </div>
  <div class="nav-item" onclick="changeMenu(this, 'page-wallet')">
    <svg viewBox="0 0 24 24"><path d="M21 7H3V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v1zm0 2H3v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9zm-4 6h-4v-2h4v2z"/></svg>
    Wallet
  </div>
  <div class="nav-item" onclick="changeMenu(this, 'page-setting')">
    <svg viewBox="0 0 24 24"><path d="M12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6zM19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.19-.48.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.19.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.03-1.58z"/></svg>
    Settings
  </div>
</div>

<script>
// --- INITIALIZE PI SDK ---
const Pi = window.Pi;
Pi.init({ version: "2.0", sandbox: true });

// --- CONFIGURATION ---
const CYCLE_HOURS = 8;
const CYCLE_SECONDS = CYCLE_HOURS * 3600;
const REWARD_PER_MIN = 0.000210;

let user = null;
let isMining = false;
let miningInterval;
let startTime;

// --- DOM ELEMENTS ---
const btn = document.getElementById('mineBtn');
const logBox = document.getElementById('mining-log');
const timerDisplay = document.getElementById('timer');
const progressBar = document.getElementById('progress-bar');
const rewardDisplay = document.getElementById('reward');

// --- AUTHENTICATION ---
async function authUser() {
  try {
    const scopes = ['username', 'payments'];
    const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
    user = auth.user;
    document.getElementById('user-id').innerText = user.username;
    document.getElementById('refLink').value = "https://evanadua.github.io/?ref=" + user.username;
    addLog("✅ Authenticated as " + user.username);
    checkMiningState();
  } catch (err) {
    addLog("❌ Auth Failed. Please use Pi Browser.");
  }
}

function onIncompletePaymentFound(payment) { /* Handle later */ }

// --- MINING LOGIC ---
function addLog(msg) {
  const time = new Date().toLocaleTimeString();
  logBox.innerHTML = `<div>[${time}] ${msg}</div>` + logBox.innerHTML;
}

function updateMiningUI() {
  const now = Date.now();
  const elapsed = Math.floor((now - startTime) / 1000);
  const remaining = CYCLE_SECONDS - elapsed;

  if (remaining <= 0) {
    stopMining(true);
  } else {
    // Timer
    const h = Math.floor(remaining / 3600).toString().padStart(2, '0');
    const m = Math.floor((remaining % 3600) / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    timerDisplay.innerText = `${h}:${m}:${s}`;

    // Progress
    const pct = ((elapsed / CYCLE_SECONDS) * 100).toFixed(2);
    progressBar.style.width = pct + "%";

    // Reward
    const reward = (elapsed / 60) * REWARD_PER_MIN;
    rewardDisplay.innerText = reward.toFixed(6) + " CPI";
  }
}

function startMining() {
  isMining = true;
  startTime = Date.now();
  localStorage.setItem('cpi_start_time', startTime);
  localStorage.setItem('cpi_is_mining', "true");

  btn.innerText = "⏸️ Pause Node";
  btn.style.background = "orange";
  document.getElementById('node-status').innerText = "Cloud Node — Active";
  document.getElementById('coinVideo').style.animation = "spin 4s linear infinite";
  
  miningInterval = setInterval(updateMiningUI, 1000);
  addLog("🚀 Mining session started.");
}

function stopMining(isComplete = false) {
  isMining = false;
  clearInterval(miningInterval);
  localStorage.setItem('cpi_is_mining', "false");
  document.getElementById('coinVideo').style.animation = "none";

  if (isComplete) {
    btn.innerText = "🎁 Claim Reward";
    btn.style.background = "#00ffaa";
    document.getElementById('node-status').innerText = "Cycle Complete!";
    addLog("✅ 8-hour cycle finished. Ready to claim.");
  } else {
    btn.innerText = "▶️ Resume Mining";
    btn.style.background = "gold";
    document.getElementById('node-status').innerText = "Cloud Node — Paused";
    addLog("⏸️ Mining paused.");
  }
}

function checkMiningState() {
  const savedState = localStorage.getItem('cpi_is_mining');
  const savedTime = localStorage.getItem('cpi_start_time');

  if (savedState === "true" && savedTime) {
    startTime = parseInt(savedTime);
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    if (elapsed < CYCLE_SECONDS) {
      isMining = true;
      miningInterval = setInterval(updateMiningUI, 1000);
      btn.innerText = "⏸️ Pause Node";
      document.getElementById('coinVideo').style.animation = "spin 4s linear infinite";
    } else {
      stopMining(true);
    }
  }
}

btn.onclick = () => {
  if (!user) return authUser();
  if (!isMining) {
    startMining();
  } else {
    stopMining(false);
  }
};

// --- NAVIGATION ---
function changeMenu(el, pageId) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.dashboard').forEach(p => p.style.display = 'none');
  document.getElementById(pageId).style.display = 'block';
}

function copyRef() {
  const input = document.getElementById('refLink');
  input.select();
  document.execCommand('copy');
  alert("Link copied!");
}

// --- ON LOAD ---
window.onload = () => {
  setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 600);
  }, 3000);
  
  authUser();
};
</script>
</body>
</html>
