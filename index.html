<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MINERV v1.3 — CPI Mining Dashboard</title>
<style>
  body {
    margin: 0;
    font-family: "Inter", Arial, sans-serif;
    background: linear-gradient(180deg, #000000, #1a1a1a, #b5933a);
    color: #fff;
    overflow-x: hidden;
  }

  /* --- Splash Screen --- */
  .splash-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #111 40%, #000);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    z-index: 9999;
    animation: fadeOut 1s ease-in-out forwards;
    animation-delay: 3s;
  }
  .splash-logo { width: 120px; height: 120px; animation: spin 6s linear infinite; }
  .splash-title { font-size: 28px; color: gold; font-weight: bold; margin-top: 20px; }
  .splash-subtitle { font-size: 16px; color: #ccc; margin-top: 5px; }

  @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

  /* SPLASH VIDEO */
  #splash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle, #1a1a1a, #000);
    z-index: 999; transition: opacity 0.4s ease-out;
  }
  #splash video { width: 120px; height: 120px; border-radius: 50%; box-shadow: 0 0 30px #f9d56e; }

  /* HEADER */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 15px; background: linear-gradient(180deg, #000000, #1a0d00);
    border-bottom: 1px solid #333;
  }
  
  /* Profile Upload Styling */
  .profile-pic {
    width: 45px; height: 45px; border-radius: 50%; border: 2px solid gold; cursor: pointer; object-fit: cover;
  }
  .wallet-box {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255, 215, 0, 0.05); padding: 6px 10px; border-radius: 8px; font-weight: bold; color: gold;
  }
  .wallet-box .balance { font-size: 16px; color: #f0d27a; font-weight: bold; }
  .wallet-box img { width: 18px; height: 18px; }

  .referral-box { text-align: center; }
  .referral-icon { width: 38px; height: 38px; animation: pulse 2s infinite; }
  .referral-count { font-size: 13px; color: #f0d27a; margin-top: 2px; }
  .kyc-status { font-size: 12px; color: #00ff99; margin-top: -2px; }

  @keyframes pulse { 0% { filter: drop-shadow(0 0 0px gold); } 50% { filter: drop-shadow(0 0 8px gold); } 100% { filter: drop-shadow(0 0 0px gold); } }

  /* MAIN DASHBOARD */
  .dashboard {
    max-width: 420px; margin: 40px auto; padding: 20px;
    background: rgba(25, 25, 25, 0.95); border-radius: 18px; box-shadow: 0 0 35px rgba(255, 215, 0, 0.15);
  }
  .coin-wrap { display: flex; justify-content: center; margin: 20px 0; }
  .coin-wrap video { width: 100px; height: 100px; border-radius: 50%; box-shadow: 0 0 25px #ffdf70; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .status { text-align: center; }
  .status h3 { margin: 8px 0; font-size: 18px; }
  .progress { height: 8px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0; }
  .progress span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, #ffda5c, #ffb400); border-radius: 10px; transition: width 0.3s linear; }
  .reward { text-align: center; font-weight: bold; }
  .supply { margin-top: 25px; font-size: 13px; opacity: 0.9; padding-left: 10px; }
  .supply p { margin: 4px 0; }
  button {
    margin-top: 18px; padding: 12px; width: 100%; border: none; border-radius: 8px;
    background: linear-gradient(90deg, #f6d365, #fda085); color: #000; font-weight: bold; cursor: pointer;
  }
  button:active { transform: scale(0.98); }
  #mining-log {
    font-family: monospace; font-size: 12px; color: #00ffaa;
    background: rgba(0,0,0,0.4); padding: 8px; border-radius: 6px; height: 80px;
    overflow-y: hidden; margin-top: 10px; line-height: 1.3em;
  }
</style>
</head>
<body>

<input type="file" id="profileUpload" accept="image/*" style="display: none;">

<div id="splash-screen" class="splash-screen">
  <div class="splash-content" style="text-align: center;">
    <img src="cpi-logo-gold.png" alt="CPI Coin" class="splash-logo">
    <h1 class="splash-title">CPI Minner</h1>
    <p class="splash-subtitle">ConsPindo Token by: MeribuCo</p>
  </div>
</div>

<div id="splash">
  <video autoplay muted loop playsinline>
    <source src="cpi_coin.mp4" type="video/mp4">
  </video>
</div>

<div class="top-bar">
  <div class="profile-box">
    <img src="profile.jpg" class="profile-pic" id="profilePic" alt="Profile" title="Klik untuk ganti foto">
  </div>

  <div class="wallet-box" id="wallet-display">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#FFD700" viewBox="0 0 24 24" style="vertical-align: middle; margin-right: 5px;">
      <path d="M21 7H5V5a2 2 0 0 1 2-2h14v4zM3 9h18a1 1 0 0 1 1 1v10a2 2 0 0 1-2 2H3V9zm14 4a2 2 0 1 0 0 4h4v-4h-4z"/>
    </svg>
    <span class="balance">0.000</span> <img src="cpi-logo-gold.png" alt="CPI">
  </div>

  <div class="referral-box">
    <img src="referral-icon.png" class="referral-icon" alt="Referral">
    <div class="referral-count">2 / 10</div>
    <div class="kyc-status">KYC Anda</div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="coin-wrap">
    <video id="coinVideo" autoplay muted loop playsinline>
      <source src="cpi_coin.mp4" type="video/mp4">
    </video>
  </div>

  <div class="status">
    <h3>Cloud Node — Ready</h3>
    <p>⏳ <span id="timer">08:00:00</span></p>
    <div class="progress"><span id="progress-bar"></span></div>
    <p class="reward">Reward: <span id="reward">0.000000 CPI</span></p>
  </div>

  <div id="mining-log"></div>

  <div class="supply">
    <p>💰 Total Supply: 100,000,000 CPI</p>
    <p id="circulating-text">🔄 Circulating: 59,999,789 CPI</p>
    <p>🔥 Burned: 25,000 CPI</p>
  </div>

  <button id="mineBtn">⛏️ Start Mining</button>
</div>

<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js" type="application/javascript"></script>
<script>
// --- CONFIG & GLOBAL VARIABLES ---
const TOKEN_ADDRESS = "0x937fCf7A4aAfb78B2CeB23CbB3Ba124AaFd453C8";
const SEPOLIA_CHAIN_ID = "0xaa36a7";
const TOKEN_ABI = [
  "function balanceOf(address owner) view returns (uint256)",
  "function decimals() view returns (uint8)",
  "function symbol() view returns (string)"
];

const CYCLE_DURATION = 8 * 60 * 60; // 8 Jam
const KEY_ELAPSED = "cpi_elapsed_time";
const KEY_LAST_START = "cpi_last_start";
const KEY_IS_MINING = "cpi_is_mining";

let provider, signer, userAddress, tokenContract;
let mining = false;
let progressVal = 0;
let totalReward = 0.000000;
let countdown = CYCLE_DURATION;
let circulating = 59999789; 

let interval, logInterval, timerInterval;

const logs = [
  "Connecting to Cloud Node...", "Authenticating wallet...", 
"Fetching task...",
"Verifying block hash...", 
"Mining in progress...", "Synchronizing blockchain...",
"Received remote task...", "6fb854fx7739bee20l...",
"Verifying block hash...",
"TaskConsumer initialized...",
"Downloading model 65.9%...",
"Loaded dataset bytes 56450...",
"Received remote task...", "5gh814ndx709igf103...",
"Loaded dataset bytes 90264...",
"Type: float32, shape: [ 1,  223,  223, 4 ]  data: 2256001..."
];

// --- FITUR UPLOAD FOTO PROFIL LOKAL ---
const profilePic = document.getElementById('profilePic');
const profileUpload = document.getElementById('profileUpload');

// Muat foto yang tersimpan saat web dibuka
const savedPic = localStorage.getItem('cpi_profile_pic');
if (savedPic) {
  profilePic.src = savedPic;
}

// Klik gambar untuk buka galeri
profilePic.onclick = () => {
  profileUpload.click();
};

// Proses penyimpanan gambar ke browser
profileUpload.onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (event) => {
      profilePic.src = event.target.result;
      localStorage.setItem('cpi_profile_pic', event.target.result); // Simpan ke memori lokal
      addLog("✅ Foto profil berhasil diperbarui!");
    };
    reader.readAsDataURL(file);
  }
};

// --- FUNGSI RUMUS DYNAMIC REWARD ---
function calculateDynamicReward(elapsedSeconds) {
  const fullMinutes = Math.floor(elapsedSeconds / 60);
  const rewardPerMinute = 0.000210; 
  let total = fullMinutes * rewardPerMinute;
  const remainingSeconds = Math.floor(elapsedSeconds % 60);

  for (let i = 0; i < remainingSeconds; i++) {
    let tier = Math.floor(i / 10); 
    let rateForThisSecond = (tier + 1) * 0.000001;
    total += rateForThisSecond;
  }
  return total;
}

// --- CORE FUNCTIONS (WEB3 WAJIB ONLINE METAMASK) ---
async function checkNetwork() {
  const chainId = await window.ethereum.request({ method: 'eth_chainId' });
  if (chainId !== SEPOLIA_CHAIN_ID) {
    try {
      await window.ethereum.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: SEPOLIA_CHAIN_ID }],
      });
    } catch (err) {
      if (err.code === 4902) addLog("⚠️ Tambahkan Sepolia ke Metamask.");
    }
  }
}

async function connectWallet() {
  if (!window.ethereum) {
    // KEMBALIKAN VALIDASI STRICT (WAJIB METAMASK)
    alert("Metamask tidak terdeteksi! Silakan buka web ini melalui browser yang memiliki ekstensi Web3 (seperti Kiwi Browser) atau di DApp Browser MetaMask.");
    return false; 
  }
  try {
    addLog("⏳ Connecting to wallet...");
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    userAddress = await signer.getAddress();
    
    await checkNetwork();
    tokenContract = new ethers.Contract(TOKEN_ADDRESS, TOKEN_ABI, signer);
    
    const balance = await tokenContract.balanceOf(userAddress);
    const decimals = await tokenContract.decimals();
    const formatted = ethers.utils.formatUnits(balance, decimals);
    document.querySelector(".wallet-box .balance").innerText = parseFloat(formatted).toFixed(3);
    
    addLog(`✅ Connected: ${userAddress.substring(0,6)}...`);
    return true;
  } catch (err) {
    console.error(err);
    addLog("❌ Connection failed.");
    return false;
  }
}

// --- LOGIKA UI & ANIMASI ---
function addLog(msg) {
  const logBox = document.getElementById('mining-log');
  logBox.innerHTML = msg + "<br>" + logBox.innerHTML;
}

function formatTime(sec) {
  const h = String(Math.floor(sec / 3600)).padStart(2, '0');
  const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function updateUI(totalElapsedSeconds) {
  countdown = CYCLE_DURATION - Math.floor(totalElapsedSeconds);
  
  if (countdown <= 0) {
    totalReward = calculateDynamicReward(CYCLE_DURATION);
    completeMiningCycle();
  } else {
    totalReward = calculateDynamicReward(totalElapsedSeconds);
    document.getElementById('timer').textContent = formatTime(countdown);
    document.getElementById('reward').innerText = totalReward.toFixed(6) + " CPI";
    
    progressVal = (totalElapsedSeconds / CYCLE_DURATION) * 100;
    document.getElementById('progress-bar').style.width = progressVal + "%";
  }
}

function completeMiningCycle() {
  mining = false;
  clearInterval(timerInterval);
  clearInterval(logInterval);
  document.getElementById('coinVideo').style.animation = "none";
  document.querySelector(".status h3").innerText = "Cycle Complete!";
  document.getElementById('timer').textContent = "00:00:00";
  document.getElementById('progress-bar').style.width = "100%";
  
  localStorage.setItem(KEY_IS_MINING, "false");
  localStorage.setItem(KEY_ELAPSED, CYCLE_DURATION.toString());
  
  const btn = document.getElementById('mineBtn');
  btn.innerText = "🎁 Claim Reward (Watch Ad)";
  btn.style.background = "linear-gradient(90deg, #00ffaa, #00b377)"; 
  addLog("✅ 8 Jam selesai. Silakan Claim!");
}

// --- FUNGSI START / RESUME ---
function startMiningAnimation() {
  mining = true;
  localStorage.setItem(KEY_IS_MINING, "true");
  localStorage.setItem(KEY_LAST_START, Date.now().toString());

  document.getElementById('mineBtn').innerText = "⏸️ Pause Mining";
  document.getElementById('mineBtn').style.background = "linear-gradient(90deg, #ffcc00, #ff9900)"; 
  document.querySelector(".status h3").innerText = "Cloud Node — Active";
  document.getElementById('coinVideo').style.animation = "spin 4s linear infinite";

  timerInterval = setInterval(() => {
    let storedElapsed = parseFloat(localStorage.getItem(KEY_ELAPSED)) || 0;
    let lastStart = parseInt(localStorage.getItem(KEY_LAST_START));
    let currentSessionElapsed = (Date.now() - lastStart) / 1000;
    let totalElapsed = storedElapsed + currentSessionElapsed;
    
    updateUI(totalElapsed);
    
    if (Math.floor(totalElapsed) % 12 === 0 && countdown > 0) {
      circulating -= 1;
      document.getElementById('circulating-text').innerHTML = '🔄 Circulating: ' + circulating.toLocaleString() + ' CPI';
    }
  }, 1000);

  logInterval = setInterval(() => {
    addLog(logs[Math.floor(Math.random() * logs.length)]);
  }, 3000);
}

// --- FUNGSI PAUSE ---
function pauseMiningProcess() {
  mining = false;
  clearInterval(timerInterval);
  clearInterval(logInterval);
  
  let storedElapsed = parseFloat(localStorage.getItem(KEY_ELAPSED)) || 0;
  let lastStart = parseInt(localStorage.getItem(KEY_LAST_START));
  let sessionElapsed = (Date.now() - lastStart) / 1000;
  
  localStorage.setItem(KEY_ELAPSED, (storedElapsed + sessionElapsed).toString());
  localStorage.setItem(KEY_IS_MINING, "false");

  document.getElementById('coinVideo').style.animation = "none";
  document.querySelector(".status h3").innerText = "Cloud Node — Paused";
  
  const btn = document.getElementById('mineBtn');
  btn.innerText = "▶️ Resume Mining";
  btn.style.background = "linear-gradient(90deg, #f6d365, #fda085)";
  
  addLog("⏸️ Mining dijeda. Data diamankan.");
}

// --- CEK STATUS SAAT HALAMAN DIBUKA ---
function checkInitialState() {
  let isMining = localStorage.getItem(KEY_IS_MINING);
  let storedElapsed = parseFloat(localStorage.getItem(KEY_ELAPSED)) || 0;

  if (storedElapsed >= CYCLE_DURATION) {
    updateUI(CYCLE_DURATION);
    return;
  }

  if (isMining === "true") {
    let lastStart = parseInt(localStorage.getItem(KEY_LAST_START));
    let timeOffline = (Date.now() - lastStart) / 1000;
    let newElapsed = storedElapsed + timeOffline;

    if (newElapsed >= CYCLE_DURATION) {
      localStorage.setItem(KEY_ELAPSED, CYCLE_DURATION.toString());
      updateUI(CYCLE_DURATION);
    } else {
      localStorage.setItem(KEY_ELAPSED, newElapsed.toString());
      localStorage.setItem(KEY_LAST_START, Date.now().toString()); 
      addLog("🔄 Melanjutkan proses latar...");
      startMiningAnimation();
    }
  } else if (storedElapsed > 0) {
    updateUI(storedElapsed);
    document.querySelector(".status h3").innerText = "Cloud Node — Paused";
    document.getElementById('mineBtn').innerText = "▶️ Resume Mining";
  }
}

// --- EVENTS ---
document.getElementById('mineBtn').onclick = async () => {
  let storedElapsed = parseFloat(localStorage.getItem(KEY_ELAPSED)) || 0;

  if (storedElapsed >= CYCLE_DURATION) {
    alert("Memuat Iklan AdMob... (Simulasi)\nSetelah iklan selesai, proses reset dari awal.");
    localStorage.removeItem(KEY_ELAPSED);
    localStorage.removeItem(KEY_LAST_START);
    localStorage.removeItem(KEY_IS_MINING);
    window.location.reload(); 
    return;
  }

  if (!mining) {
    const connected = await connectWallet();
    if (connected) {
      startMiningAnimation();
      addLog(storedElapsed > 0 ? "▶️ Mining dilanjutkan" : "🚀 Mining cycle dimulai");
    }
  } else {
    pauseMiningProcess();
  }
};

window.onload = () => {
  setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 600);
  }, 5000);

  checkInitialState();
};

if (window.ethereum) {
  window.ethereum.on('accountsChanged', () => window.location.reload());
}
</script>
</body>
</html>
